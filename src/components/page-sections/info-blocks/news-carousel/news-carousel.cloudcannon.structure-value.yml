label: News Carousel
icon: newspaper
description: 'Parallax-header news carousel: dark navy overlay banner with centered heading + italic subtitle, plus a horizontal carousel of news article cards below with left/right arrow controls on the header edges.'
value:
  _component: page-sections/info-blocks/news-carousel
  sectionLabel: ""
  heading: Latest News
  subtitle: Keep up to date with news from our school
  parallaxImageSource: /src/assets/images/parallax/template-header.jpg
  parallaxImageAlt: School campus header
  items: []
  maxContentWidth: none
  paddingHorizontal: none
  paddingVertical: none
  colorScheme: inherit
  backgroundColor:
  background:
    type: image
    positionVertical: top
    positionHorizontal: center
    priority: false
    imageSource: ""
    imageAlt: ""
    videoSource: null
    overlay: 0
preview:
  text:
    - key: heading
    - News Carousel
  subtext:
    - key: subtitle
  icon: newspaper
picker_preview:
  text: News Carousel
  subtext: Parallax-header banner with a horizontal carousel of news article cards.
_inputs_from_glob:
  - /src/components/page-sections/info-blocks/news-carousel/news-carousel.cloudcannon.inputs.yml
_inputs:
  sectionLabel:
    type: text
    comment: Optional label to identify the section in the editor. When set and no HTML id is provided, an id is derived from this value.
  maxContentWidth:
    type: select
    comment: Maximum width constraint for the content.
    options:
      values:
        - id: none
          name: None
        - id: xs
          name: Extra Small
        - id: sm
          name: Small
        - id: md
          name: Medium
        - id: lg
          name: Large
        - id: xl
          name: Extra Large
        - id: 2xl
          name: 2xl
        - id: 3xl
          name: 3xl
  paddingHorizontal:
    type: select
    comment: Horizontal padding applied to the section content.
    options:
      values:
        - id: none
          name: None
        - id: xs
          name: Extra Small
        - id: sm
          name: Small
        - id: md
          name: Medium
        - id: lg
          name: Large
        - id: xl
          name: Extra Large
        - id: 2xl
          name: 2xl
        - id: 3xl
          name: 3xl
  paddingVertical:
    type: select
    comment: Vertical padding applied to the section content.
    options:
      values:
        - id: none
          name: None
        - id: xs
          name: Extra Small
        - id: sm
          name: Small
        - id: md
          name: Medium
        - id: lg
          name: Large
        - id: xl
          name: Extra Large
        - id: 2xl
          name: 2xl
        - id: 3xl
          name: 3xl
        - id: 4xl
          name: 4xl
        - id: 5xl
          name: 5xl
        - id: 6xl
          name: 6xl
  colorScheme:
    type: select
    comment: Color scheme theme for the section wrapper.
    options:
      values:
        - id: inherit
          name: Inherit
        - id: light
          name: Light
        - id: dark
          name: Dark
  backgroundColor:
    type: select
    comment: Solid background color token behind the section content.
    options:
      values:
        - id: none
          name: None
        - id: base
          name: Base
        - id: surface
          name: Surface
        - id: accent
          name: Accent
        - id: highlight
          name: Highlight
  background:
    type: object
    comment: Optional CustomSection background image or video (not the parallax header — use parallaxImageSource for that).
    options:
      preview:
        icon: wallpaper
        text:
          - Background
        subtext:
          - key: type
  background.type:
    type: select
    label: Background type
    comment: A cover image or a muted autoplay video.
    options:
      values:
        - id: image
          name: Image
        - id: video
          name: Video
  background.positionVertical:
    comment: Vertical focal point.
    type: select
    options:
      values:
        - id: top
          name: Top
        - id: center
          name: Center
        - id: bottom
          name: Bottom
  background.positionHorizontal:
    comment: Horizontal focal point.
    type: select
    options:
      values:
        - id: left
          name: Left
        - id: center
          name: Center
        - id: right
          name: Right
  background.priority:
    type: switch
    label: Prioritize image load
    comment: When using a background image, load it eagerly.
    hidden: "background.type !== 'image'"
  background.imageSource:
    comment: URL or path to the background image.
    type: image
    hidden: "background.type !== 'image'"
    options:
      paths:
        uploads: src/assets/images
        static: ""
      resize_style: contain
      width: 1920
      height: 1280
  background.imageAlt:
    comment: Alt text for the background image.
    type: textarea
    hidden: "background.type !== 'image'"
  background.videoSource:
    type: file
    label: Video source
    comment: Path to a video under public/videos.
    hidden: "background.type !== 'video'"
    options:
      accepts_mime_types:
        - video/mp4
        - video/webm
        - video/ogg
      paths:
        uploads: public/videos
        static: public
  background.overlay:
    type: range
    comment: 'Overlay in front of the CustomSection background (-1.0 to 1.0). Negative values darken, positive values lighten.'
    options:
      min: -1
      max: 1
      step: 0.1
_structures:
  newsCarouselItems:
    values:
      - label: News article
        icon: article
        value:
          title: News article title
          date: Monday January 1, 2026
          lead: Short lead paragraph describing the article.
          imageSource: ""
          imageAlt: ""
          link: /news/article-slug
        preview:
          text:
            - key: title
            - News article
          subtext:
            - key: date
          image:
            - key: imageSource
        _inputs:
          title:
            type: text
            comment: Article title shown on the card (rendered as h3).
          date:
            type: text
            comment: Publish date string shown beneath the title (e.g. 'Monday January 1, 2026').
          lead:
            type: textarea
            comment: Short lead paragraph shown beneath the date.
          imageSource:
            type: image
            comment: Thumbnail photo shown at the top of the card.
            options:
              paths:
                uploads: src/assets/images
                static: ""
              resize_style: cover
              width: 600
              height: 400
          imageAlt:
            type: textarea
            comment: Alt text describing the thumbnail photo for screen readers.
          link:
            type: url
            comment: URL the card links to when clicked. Leave empty for a non-clickable card.
