label: Promo Tile Grid
icon: grid_view
description: 'Responsive grid of image tiles with navy overlays and centered heading links. Hover turns overlay crimson.'
value:
  _component: page-sections/features/promo-tile-grid
  sectionLabel: ""
  tiles: []
  maxContentWidth: 2xl
  paddingHorizontal: lg
  paddingVertical: none
  colorScheme: inherit
  backgroundColor:
  background:
    type: image
    positionVertical: top
    positionHorizontal: center
    priority: false
    imageSource: ""
    imageAlt: ""
    videoSource: null
    overlay: 0
preview:
  text:
    - Promo Tile Grid
  subtext:
    - key: tiles[0].heading
  icon: grid_view
picker_preview:
  text: Promo Tile Grid
  subtext: Clickable image tiles in a 3-column grid with navy overlays.
_inputs_from_glob:
  - /src/components/page-sections/features/promo-tile-grid/promo-tile-grid.cloudcannon.inputs.yml
_inputs:
  sectionLabel:
    type: text
    comment: Optional label to identify the section in the editor. When set and no HTML id is provided, an id is derived from this value.
  maxContentWidth:
    type: select
    comment: Maximum width constraint for the content.
    options:
      values:
        - id: none
          name: None
        - id: xs
          name: Extra Small
        - id: sm
          name: Small
        - id: md
          name: Medium
        - id: lg
          name: Large
        - id: xl
          name: Extra Large
        - id: 2xl
          name: 2xl
        - id: 3xl
          name: 3xl
  paddingHorizontal:
    type: select
    comment: Horizontal padding applied to the section content.
    options:
      values:
        - id: none
          name: None
        - id: xs
          name: Extra Small
        - id: sm
          name: Small
        - id: md
          name: Medium
        - id: lg
          name: Large
        - id: xl
          name: Extra Large
        - id: 2xl
          name: 2xl
        - id: 3xl
          name: 3xl
  paddingVertical:
    type: select
    comment: Vertical padding applied to the section content.
    options:
      values:
        - id: none
          name: None
        - id: xs
          name: Extra Small
        - id: sm
          name: Small
        - id: md
          name: Medium
        - id: lg
          name: Large
        - id: xl
          name: Extra Large
        - id: 2xl
          name: 2xl
        - id: 3xl
          name: 3xl
        - id: 4xl
          name: 4xl
        - id: 5xl
          name: 5xl
        - id: 6xl
          name: 6xl
  colorScheme:
    type: select
    comment: Color scheme theme for the section wrapper.
    options:
      values:
        - id: inherit
          name: Inherit
        - id: light
          name: Light
        - id: dark
          name: Dark
  backgroundColor:
    type: select
    comment: Solid background color token behind the section content.
    options:
      values:
        - id: none
          name: None
        - id: base
          name: Base
        - id: surface
          name: Surface
        - id: accent
          name: Accent
        - id: highlight
          name: Highlight
  background:
    type: object
    comment: Optional background still image or looping HTML5 video (self-hosted). Shared positioning applies to whichever type you choose.
    options:
      preview:
        icon: wallpaper
        text:
          - Background
        subtext:
          - key: type
  background.type:
    type: select
    label: Background type
    comment: A cover image or a muted autoplay video.
    options:
      values:
        - id: image
          name: Image
        - id: video
          name: Video
  background.positionVertical:
    comment: Vertical focal point.
    type: select
    options:
      values:
        - id: top
          name: Top
        - id: center
          name: Center
        - id: bottom
          name: Bottom
  background.positionHorizontal:
    comment: Horizontal focal point.
    type: select
    options:
      values:
        - id: left
          name: Left
        - id: center
          name: Center
        - id: right
          name: Right
  background.priority:
    type: switch
    label: Prioritize image load
    comment: When using a background image, load it eagerly.
    hidden: "background.type !== 'image'"
  background.imageSource:
    comment: URL or path to the background image.
    type: image
    hidden: "background.type !== 'image'"
    options:
      paths:
        uploads: src/assets/images
        static: ""
      resize_style: contain
      width: 1920
      height: 1280
  background.imageAlt:
    comment: Alt text for the background image.
    type: textarea
    hidden: "background.type !== 'image'"
  background.videoSource:
    type: file
    label: Video source
    comment: Path to a video under public/videos.
    hidden: "background.type !== 'video'"
    options:
      accepts_mime_types:
        - video/mp4
        - video/webm
        - video/ogg
      paths:
        uploads: public/videos
        static: public
  background.overlay:
    type: range
    comment: 'Overlay in front of the background (-1.0 to 1.0). Negative values darken, positive values lighten.'
    options:
      min: -1
      max: 1
      step: 0.1
_structures:
  promoTileGridItems:
    values:
      - label: Promo Tile
        icon: image
        value:
          heading: Tile heading
          link: /
          imageSource: ""
          imageAlt: ""
        preview:
          text:
            - key: heading
            - Promo Tile
          subtext:
            - key: link
          image:
            - key: imageSource
        _inputs:
          heading:
            type: text
            comment: Centered heading shown on top of the tile.
          link:
            type: url
            comment: URL the tile links to when clicked.
          imageSource:
            type: image
            comment: Background photo for the tile. Leave empty for a solid navy tile.
            options:
              paths:
                uploads: src/assets/images
                static: ""
              resize_style: cover
              width: 900
              height: 700
          imageAlt:
            type: textarea
            comment: Alt text describing the tile photo for screen readers.
