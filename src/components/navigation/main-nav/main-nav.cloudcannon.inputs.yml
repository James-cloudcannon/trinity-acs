logoSource:
  type: image
  comment: "Logo image source URL or path. Leave empty to hide the logo."
  options:
    resize_style: contain
    width: 1920
    height: 1280
logoAlternateSource:
  type: image
  comment: "Optional alternate logo shown when the site theme is toggled. The main logo is shown by default."
  options:
    resize_style: contain
    width: 1920
    height: 1280
logoAlt:
  type: text
  comment: "Alt text for the logo image for accessibility."
navData:
  type: array
  comment: "Mega-menu category groups. Each group renders a column with a head link and child links."
  options:
    structures: _structures.navItemLevel1
topLinks:
  type: array
  comment: "Quick links that appear in the left sidebar of the mega-menu."
  options:
    structures: _structures.topLink
facebookHref:
  type: url
  comment: "Facebook page URL for the social icon in the header bar."
  options:
    hide_link_to_file: true
    hide_link_to_email_address: true
    hide_link_to_telephone: true
searchAction:
  type: url
  comment: "URL the search form posts to."
  options:
    hide_link_to_file: true
    hide_link_to_email_address: true
    hide_link_to_telephone: true
_structures:
  topLink:
    values:
      - label: Top Link
        icon: link
        value:
          name: ""
          path: ""
        _inputs:
          name:
            type: text
            comment: "Display text."
          path:
            type: url
            comment: "URL."
            options:
              hide_link_to_file: true
              hide_link_to_email_address: true
              hide_link_to_telephone: true
  navItemLevel1:
    values:
      - label: Navigation Item (Level 1)
        icon: link
        value:
          name: ""
          path: ""
          children: []
        _inputs:
          name:
            type: text
            comment: "Display text for the navigation item."
          path:
            type: url
            comment: "URL path for the navigation item."
            options:
              hide_link_to_file: true
              hide_link_to_email_address: true
              hide_link_to_telephone: true
          children:
            type: array
            comment: "Child navigation items for dropdown menus."
            options:
              structures: _structures.navItemLevel2
  navItemLevel2:
    values:
      - label: Navigation Item (Level 2)
        icon: link
        value:
          name: ""
          path: ""
          children: []
        _inputs:
          name:
            type: text
            comment: "Display text for the child navigation item."
          path:
            type: url
            comment: "URL path for the child navigation item."
            options:
              hide_link_to_file: true
              hide_link_to_email_address: true
              hide_link_to_telephone: true
          children:
            type: array
            comment: "Grandchild navigation items for nested dropdowns."
            options:
              structures: _structures.navItemLevel3
  navItemLevel3:
    values:
      - label: Navigation Item (Level 3)
        icon: link
        value:
          name: ""
          path: ""
        _inputs:
          name:
            type: text
            comment: "Display text for the grandchild navigation item."
          path:
            type: url
            comment: "URL path for the grandchild navigation item."
            options:
              hide_link_to_file: true
              hide_link_to_email_address: true
              hide_link_to_telephone: true
